<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin · Corazón de León</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9943b;
    --gold-soft: #e8d898;
    --dark: #0a0a0a;
    --card: #141414;
    --line: rgba(201,148,59,0.18);
    --text: #e8d898;
    --muted: rgba(232,216,152,0.55);
    --err: #d97766;
    --ok: #6cbf7b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--dark);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem; }
  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-size: 1.5rem;
    margin: 0 0 0.4rem;
  }
  .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }
  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  input[type=text], input[type=password], input[type=file], textarea, select {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1.2rem;
  }
  textarea { min-height: 90px; resize: vertical; }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--gold);
  }
  .row { display: flex; gap: 1rem; }
  .row > * { flex: 1; }
  button {
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: 0.75rem 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 500;
    transition: background 0.2s;
  }
  button:hover { background: var(--gold-soft); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
  }
  button.ghost:hover { background: rgba(201,148,59,0.1); }
  button.danger {
    background: transparent;
    color: var(--err);
    border: 1px solid var(--err);
    padding: 0.45rem 1rem;
    font-size: 0.65rem;
  }
  button.danger:hover { background: rgba(217,119,102,0.12); }
  .status { margin-top: 1rem; font-size: 0.95rem; min-height: 1.3em; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .event-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    padding: 1rem 0;
    border-bottom: 1px solid var(--line);
  }
  .event-row:last-child { border-bottom: none; }
  .event-row .date {
    background: var(--gold);
    color: var(--dark);
    text-align: center;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    min-width: 60px;
    font-family: 'Cinzel', serif;
    font-weight: 500;
  }
  .event-row .date .d { font-size: 1.3rem; line-height: 1; }
  .event-row .date .m { font-size: 0.65rem; letter-spacing: 0.1em; }
  .event-row .info { flex: 1; min-width: 0; }
  .event-row .info h3 {
    margin: 0 0 0.25rem;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .event-row .info p {
    margin: 0;
    font-size: 0.9rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .event-row img {
    width: 50px; height: 50px; object-fit: cover; border-radius: 4px;
  }
  .empty { color: var(--muted); text-align: center; padding: 1.5rem; }
  .footer-link { text-align: center; margin-top: 2rem; }
  .footer-link a { color: var(--muted); font-size: 0.9rem; text-decoration: none; }
  .footer-link a:hover { color: var(--gold); }
  .hidden { display: none !important; }
  .small { font-size: 0.85rem; color: var(--muted); margin-top: -0.7rem; margin-bottom: 1rem; }
  .logout {
    float: right;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.4rem 0.8rem;
    font-size: 0.65rem;
  }
  .logout:hover { color: var(--gold); border-color: var(--gold); background: transparent; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ─── LOGIN ─── -->
  <div id="loginView">
    <h1>Admin</h1>
    <div class="sub">Sign in to manage events.</div>
    <div class="card">
      <form id="loginForm">
        <label>Password</label>
        <input type="password" id="pw" autofocus required>
        <button type="submit" id="loginBtn">Unlock</button>
        <div class="status" id="loginStatus"></div>
      </form>
    </div>
    <div class="footer-link"><a href="index.html">← Back to site</a></div>
  </div>

  <!-- ─── ADMIN ─── -->
  <div id="adminView" class="hidden">
    <button class="logout" onclick="logout()">Sign out</button>
    <h1>Manage Events</h1>
    <div class="sub">Changes publish to the live site within ~1–2 minutes after saving.</div>

    <div class="card">
      <label style="margin-bottom:1rem;">Current Events</label>
      <div id="eventsList"><div class="empty">Loading…</div></div>
    </div>

    <div class="card">
      <label style="margin-bottom:1rem;">Add a New Event</label>
      <form id="addForm">
        <div class="row">
          <div>
            <label>Day</label>
            <input type="text" id="day" placeholder="05" maxlength="2" required>
          </div>
          <div>
            <label>Month</label>
            <select id="month" required>
              <option value="JAN">JAN</option><option value="FEB">FEB</option>
              <option value="MAR">MAR</option><option value="APR">APR</option>
              <option value="MAY">MAY</option><option value="JUN">JUN</option>
              <option value="JUL">JUL</option><option value="AUG">AUG</option>
              <option value="SEP">SEP</option><option value="OCT">OCT</option>
              <option value="NOV">NOV</option><option value="DEC">DEC</option>
            </select>
          </div>
        </div>

        <label>Title</label>
        <input type="text" id="title" placeholder="Cinco de Mayo Celebration" required>

        <label>Description</label>
        <textarea id="desc" placeholder="What's happening, when, and any details guests should know." required></textarea>

        <label>Flyer / Image (optional)</label>
        <input type="file" id="img" accept="image/*">
        <div class="small">JPG, PNG, or GIF. Max ~5 MB.</div>

        <button type="submit" id="addBtn">Publish Event</button>
        <div class="status" id="addStatus"></div>
      </form>
    </div>

    <div class="footer-link"><a href="index.html">← Back to site</a></div>
  </div>

</div>

<script>
// ── Repo config ─────────────────────────────────────────────
var REPO_OWNER = '123maria0608-star';
var REPO_NAME  = 'corazon-de-leon';
var BRANCH     = 'main';
var SECRET_URL = 'admin/secret.json';

// ── Crypto helpers (AES-GCM + PBKDF2 via Web Crypto) ─────────
function b64ToBytes(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function bytesToB64(bytes) {
  var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
async function deriveKey(password, salt) {
  var pwKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 200000, hash: 'SHA-256' },
    pwKey,
    { name: 'AES-GCM', length: 256 },
    false, ['decrypt']
  );
}
async function decryptPat(password, secret) {
  var salt = b64ToBytes(secret.salt);
  var iv = b64ToBytes(secret.iv);
  var ct = b64ToBytes(secret.ct);
  var key = await deriveKey(password, salt);
  var pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
  return new TextDecoder().decode(pt);
}

// ── State ────────────────────────────────────────────────────
var token = sessionStorage.getItem('cdl_token') || null;
var eventsState = { items: [], sha: null };

// ── GitHub API ──────────────────────────────────────────────
function gh(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({
    'Accept': 'application/vnd.github+json',
    'Authorization': 'Bearer ' + token,
    'X-GitHub-Api-Version': '2022-11-28'
  }, opts.headers || {});
  return fetch('https://api.github.com' + path, opts);
}
async function ghGetFile(path) {
  var r = await gh('/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + encodeURIComponent(path) + '?ref=' + BRANCH);
  if (r.status === 404) return { content: null, sha: null };
  if (!r.ok) throw new Error('GET ' + path + ' failed: ' + r.status);
  var j = await r.json();
  return { content: j.content, sha: j.sha };
}
async function ghPutFile(path, contentB64, sha, message) {
  var body = { message: message, content: contentB64, branch: BRANCH };
  if (sha) body.sha = sha;
  var r = await gh('/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + encodeURIComponent(path), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    var err = await r.text();
    throw new Error('PUT ' + path + ' failed: ' + r.status + ' ' + err);
  }
  return r.json();
}
function utf8ToB64(s) {
  return btoa(unescape(encodeURIComponent(s)));
}
function b64ToUtf8(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
}

// ── Login ───────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var pw = document.getElementById('pw').value;
  var btn = document.getElementById('loginBtn');
  var status = document.getElementById('loginStatus');
  status.className = 'status'; status.textContent = '';
  btn.disabled = true; btn.textContent = 'Unlocking…';
  try {
    var r = await fetch(SECRET_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('No admin secret found. Setup not complete.');
    var secret = await r.json();
    var pat = await decryptPat(pw, secret);
    if (!pat || pat.length < 10) throw new Error('Wrong password.');
    token = pat;
    sessionStorage.setItem('cdl_token', pat);
    showAdmin();
  } catch (err) {
    status.className = 'status err';
    status.textContent = err.message.indexOf('decrypt') >= 0 ? 'Wrong password.' : err.message;
    btn.disabled = false; btn.textContent = 'Unlock';
  }
});

function logout() {
  sessionStorage.removeItem('cdl_token');
  token = null;
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('pw').value = '';
}

// ── Admin view ──────────────────────────────────────────────
async function showAdmin() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('adminView').classList.remove('hidden');
  await loadEvents();
}

async function loadEvents() {
  var listEl = document.getElementById('eventsList');
  listEl.innerHTML = '<div class="empty">Loading…</div>';
  try {
    var f = await ghGetFile('events.json');
    if (f.content) {
      eventsState.items = JSON.parse(b64ToUtf8(f.content));
      eventsState.sha = f.sha;
    } else {
      eventsState.items = [];
      eventsState.sha = null;
    }
    renderEvents();
  } catch (err) {
    if (err.message.indexOf('401') >= 0) {
      listEl.innerHTML = '<div class="empty" style="color:var(--err)">Stored token is invalid. Sign out and try again.</div>';
    } else {
      listEl.innerHTML = '<div class="empty" style="color:var(--err)">Couldn\'t load events: ' + err.message + '</div>';
    }
  }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function renderEvents() {
  var listEl = document.getElementById('eventsList');
  if (!eventsState.items.length) {
    listEl.innerHTML = '<div class="empty">No events yet. Add one below.</div>';
    return;
  }
  listEl.innerHTML = eventsState.items.map(function(e, i) {
    var imgTag = e.img ? '<img src="' + esc(e.img) + '" alt="">' : '';
    return '<div class="event-row">' +
      '<div class="date"><div class="d">' + esc(e.day) + '</div><div class="m">' + esc(e.month) + '</div></div>' +
      '<div class="info"><h3>' + esc(e.title) + '</h3><p>' + esc(e.desc) + '</p></div>' +
      imgTag +
      '<button class="danger" onclick="deleteEvent(' + i + ')">Delete</button>' +
      '</div>';
  }).join('');
}

async function deleteEvent(idx) {
  var ev = eventsState.items[idx];
  if (!confirm('Delete "' + ev.title + '"?')) return;
  var newItems = eventsState.items.slice();
  newItems.splice(idx, 1);
  try {
    var content = utf8ToB64(JSON.stringify(newItems, null, 2) + '\n');
    var res = await ghPutFile('events.json', content, eventsState.sha, 'admin: delete event "' + ev.title + '"');
    eventsState.items = newItems;
    eventsState.sha = res.content.sha;
    renderEvents();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

// ── Add event ───────────────────────────────────────────────
function fileToB64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      var result = reader.result;
      var b64 = result.substring(result.indexOf(',') + 1);
      resolve(b64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40) || 'event';
}

document.getElementById('addForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('addBtn');
  var status = document.getElementById('addStatus');
  status.className = 'status'; status.textContent = '';
  btn.disabled = true; btn.textContent = 'Publishing…';

  try {
    var day = document.getElementById('day').value.trim();
    var month = document.getElementById('month').value;
    var title = document.getElementById('title').value.trim();
    var desc = document.getElementById('desc').value.trim();
    var imgFile = document.getElementById('img').files[0];

    var imgPath = '';
    if (imgFile) {
      if (imgFile.size > 5 * 1024 * 1024) throw new Error('Image is over 5 MB.');
      var ext = (imgFile.name.split('.').pop() || 'png').toLowerCase().replace(/[^a-z0-9]/g, '') || 'png';
      var fname = slugify(title) + '-' + Date.now() + '.' + ext;
      imgPath = 'images/' + fname;
      status.textContent = 'Uploading image…';
      var imgB64 = await fileToB64(imgFile);
      await ghPutFile(imgPath, imgB64, null, 'admin: upload image for "' + title + '"');
    }

    status.textContent = 'Saving event…';
    // Re-fetch latest events.json sha to avoid conflicts
    var latest = await ghGetFile('events.json');
    var items = latest.content ? JSON.parse(b64ToUtf8(latest.content)) : [];
    items.push({ day: day, month: month, title: title, desc: desc, img: imgPath });
    var content = utf8ToB64(JSON.stringify(items, null, 2) + '\n');
    var res = await ghPutFile('events.json', content, latest.sha, 'admin: add event "' + title + '"');
    eventsState.items = items;
    eventsState.sha = res.content.sha;
    renderEvents();

    document.getElementById('addForm').reset();
    status.className = 'status ok';
    status.textContent = '✓ Published. Live in ~1–2 min.';
  } catch (err) {
    status.className = 'status err';
    status.textContent = err.message;
  }
  btn.disabled = false; btn.textContent = 'Publish Event';
});

// ── Auto-resume session ─────────────────────────────────────
if (token) showAdmin();
</script>
</body>
</html>
