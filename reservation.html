<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserve a Table — Corazón De León</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9943B; --gold-light: #E5B75A; --dark: #0A0603;
      --dark2: #120E08; --text-cream: #E8D898; --text-dim: rgba(232,216,152,0.6);
    }
    body {
      font-family: 'Playfair Display', serif;
      background: var(--dark2);
      color: var(--text-cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
    }

    .card {
      background: var(--dark);
      border: 1px solid rgba(201,148,59,0.25);
      border-radius: 4px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo-wrap img {
      width: 70px; height: 70px;
      border-radius: 50%; object-fit: cover;
      filter: drop-shadow(0 0 20px rgba(201,148,59,0.35));
    }

    .overline {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.38em;
      color: var(--gold);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text-cream);
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }
    .sub {
      text-align: center;
      font-style: italic;
      color: var(--text-dim);
      font-size: 0.88rem;
      margin-bottom: 2.2rem;
    }

    .divider {
      display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(201,148,59,0.2);
    }
    .divider span { color: var(--gold); font-size: 0.7rem; letter-spacing: 0.3em; white-space: nowrap; }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }
    input, select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,148,59,0.22);
      color: var(--text-cream);
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--gold); }
    input::placeholder { color: rgba(232,216,152,0.25); }
    select { background: var(--dark2); color: rgba(232,216,152,0.75); cursor: pointer; }
    select option { background: var(--dark2); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }

    button[type=submit] {
      width: 100%;
      background: var(--gold);
      color: var(--dark);
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      font-weight: 700;
      padding: 1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 0.4rem;
    }
    button[type=submit]:hover { background: var(--gold-light); box-shadow: 0 6px 24px rgba(201,148,59,0.3); }
    button[type=submit]:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      display: none; margin-top: 1rem; padding: 0.85rem 1rem;
      border-radius: 2px; font-size: 0.9rem; text-align: center; line-height: 1.5;
    }
    .status.ok  { display:block; background: rgba(80,180,100,0.1); color: #8fd49a; border: 1px solid rgba(80,180,100,0.2); }
    .status.err { display:block; background: rgba(200,80,80,0.1); color: #f4a0a0; border: 1px solid rgba(200,80,80,0.2); }

    .footer-note {
      text-align: center;
      margin-top: 2rem;
      color: rgba(232,216,152,0.25);
      font-size: 0.82rem;
      font-style: italic;
      line-height: 1.7;
    }
    .footer-note a { color: var(--gold); text-decoration: none; }
    .footer-note a:hover { color: var(--gold-light); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(232,216,152,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    @media (max-width: 520px) {
      .card { padding: 2.2rem 1.5rem; }
      .row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="Corazón De León">
    </div>
    <div class="overline">Ben Lomond · California</div>
    <h1>Reserve a Table</h1>
    <p class="sub">Tue – Sun &nbsp;·&nbsp; 11:00 AM – 9:00 PM</p>

    <div class="divider"><span>✦ &nbsp; ✦ &nbsp; ✦</span></div>

    <form id="resForm">
      <label>Full Name *</label>
      <input type="text" name="name" placeholder="Your name" required>

      <div class="row">
        <div>
          <label>Date *</label>
          <input type="date" name="date" required>
        </div>
        <div>
          <label>Time *</label>
          <select name="time">
            <option value="">Select time</option>
            <option>11:00 AM</option><option>11:30 AM</option>
            <option>12:00 PM</option><option>12:30 PM</option>
            <option>1:00 PM</option><option>1:30 PM</option>
            <option>2:00 PM</option><option>2:30 PM</option>
            <option>3:00 PM</option><option>3:30 PM</option>
            <option>4:00 PM</option><option>4:30 PM</option>
            <option>5:00 PM</option><option>5:30 PM</option>
            <option>6:00 PM</option><option>6:30 PM</option>
            <option>7:00 PM</option><option>7:30 PM</option>
            <option>8:00 PM</option><option>8:30 PM</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Party Size *</label>
          <select name="party">
            <option value="">Guests</option>
            <option>1 guest</option><option>2 guests</option><option>3 guests</option>
            <option>4 guests</option><option>5 guests</option><option>6 guests</option>
            <option>7 guests</option><option>8 guests</option><option>9 guests</option>
            <option>10+ guests</option>
          </select>
        </div>
        <div>
          <label>Phone *</label>
          <input type="tel" name="phone" placeholder="(831) 555-0000" required>
        </div>
      </div>

      <label>Email * <span style="font-family:'Playfair Display',serif;letter-spacing:0;text-transform:none;font-size:0.78rem;color:var(--text-dim);font-style:italic;">(confirmation sent here)</span></label>
      <input type="email" name="email" placeholder="your@email.com" required>

      <button type="submit">Request Reservation →</button>
      <div class="status" id="status"></div>
    </form>

    <div class="footer-note">
      A confirmation will be sent to your email.<br>
      Questions? Call <a href="tel:+18312893014">(831) 289-3014</a>
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to Corazón De León</a>

  <script>
    var SHEET_URL = 'https://script.google.com/macros/s/AKfycbywPq3_4jrUg4wBbhI4wkO5f9UrhFHZjS1sQ17yChoCS90kH1JWmVwzOrljm-sMnvRs/exec';

    document.getElementById('resForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var form = e.target;
      var btn  = form.querySelector('button[type=submit]');
      var status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.className = 'status';

      var params = new URLSearchParams();
      new FormData(form).forEach(function(v, k) { params.append(k, v); });

      try {
        await fetch(SHEET_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
        status.className = 'status ok';
        status.textContent = '✓ Reservation received! A confirmation has been sent to your email.';
        form.reset();
        btn.textContent = 'Sent ✓';
      } catch(err) {
        status.className = 'status err';
        status.textContent = 'Something went wrong — please call us at (831) 289-3014.';
        btn.disabled = false;
        btn.textContent = 'Try Again';
      }
    });
  </script>

</body>
</html>
